        <div class="container">
        <h1>Contacto</h1>
        <p>¿Tenés alguna consulta? Completá el formulario y te respondemos a la brevedad.</p>

    <div class="formulario-contacto">
        <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre completo">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="tu@email.com">
        </div>
        <div class="form-group">
            <label for="asunto">Asunto</label>
            <input type="text" id="asunto" placeholder="¿En qué te podemos ayudar?">
        </div>
        <div class="form-group">
            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" rows="5" placeholder="Escribí tu mensaje aquí..."></textarea>
        </div>
        <button class="btn-enviar">Enviar mensaje</button>
    </div>

    </div>
